<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG × BEAM Data Architecture</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f8f6;
    margin: 0;
    padding: 24px;
    color: #2c2c2a;
  }
  h1 { font-size: 20px; font-weight: 500; margin: 0 0 4px; }
  p.sub { font-size: 13px; color: #5f5e5a; margin: 0 0 24px; }
  .card {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 24px;
    max-width: 760px;
    margin: 0 auto;
  }
  svg { width: 100%; height: auto; }

  /* color ramps — light mode */
  .c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text.th { fill: #085041; }
  .c-teal text.ts { fill: #0F6E56; }

  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text.th { fill: #3C3489; }
  .c-purple text.ts { fill: #534AB7; }

  .c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #BA7517; }
  .c-amber text.th { fill: #633806; }
  .c-amber text.ts { fill: #854F0B; }

  .c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text.th { fill: #2C2C2A; }
  .c-gray text.ts { fill: #5F5E5A; }

  text.th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
  text.ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  line.arr { stroke: #888780; stroke-width: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    .card { background: #242422; border-color: rgba(255,255,255,0.1); }
    p.sub { color: #888780; }

    .c-teal rect { fill: #085041; stroke: #5DCAA5; }
    .c-teal text.th { fill: #9FE1CB; }
    .c-teal text.ts { fill: #5DCAA5; }

    .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple text.th { fill: #CECBF6; }
    .c-purple text.ts { fill: #AFA9EC; }

    .c-amber rect { fill: #633806; stroke: #EF9F27; }
    .c-amber text.th { fill: #FAC775; }
    .c-amber text.ts { fill: #EF9F27; }

    .c-gray rect { fill: #2C2C2A; stroke: #888780; }
    .c-gray text.th { fill: #D3D1C7; }
    .c-gray text.ts { fill: #888780; }

    text.th { fill: #c2c0b6; }
    text.ts { fill: #888780; }
    line.arr { stroke: #888780; }
  }
</style>
</head>
<body>
<div class="card">
